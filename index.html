<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT 核心單字互動字卡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e67e22;
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .settings-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .filter-btn, .action-btn {
            background-color: transparent;
            border: 2px solid var(--secondary-color);
            color: var(--secondary-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .action-btn {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .upload-btn {
            border-color: #27ae60;
            color: #27ae60;
            display: inline-block;
        }

        .upload-btn:hover {
            background-color: #27ae60;
            color: white;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--secondary-color);
            color: white;
        }

        .action-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .flashcard-container {
            width: 100%;
            max-width: 500px;
            height: 300px;
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-front {
            background-color: var(--card-bg);
            color: var(--primary-color);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--primary-color);
            color: white;
        }

        /* 針對文字的樣式 */
        .word-title {
            font-size: 2.5rem;
            margin: 0;
            font-weight: bold;
        }

        .pos-badge {
            background-color: var(--secondary-color);
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }

        .definition-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin: 0;
        }

        .definition-zh {
            font-size: 1rem;
            color: #bdc3c7; /* 淺灰色，用於背面中文翻譯 */
            margin-top: 10px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .nav-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .nav-btn:hover {
            background-color: #1a252f;
        }

        .nav-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .progress {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            min-width: 60px;
            text-align: center;
        }

        .flip-hint {
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>SAT 單字互動字卡</h1>

    <div class="controls" id="week-filters">
        <button class="filter-btn active" data-week="All">All Weeks</button>
        </div>

    <div class="settings-controls">
        <button class="action-btn" id="shuffle-btn" onclick="shuffleCards()">🔀 隨機打亂 (Shuffle)</button>
        <button class="action-btn" id="reverse-btn" onclick="toggleReverseMode()">🔄 看定義猜單字 (Definition First)</button>
        
        <label for="excel-upload" class="action-btn upload-btn" style="cursor: pointer;">📁 匯入 Excel 題庫</label>
        <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" style="display: none;" onchange="handleFileUpload(event)">
    </div>

    <div class="flashcard-container" onclick="toggleFlip()">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front" id="card-front-content"></div>
            <div class="card-face card-back" id="card-back-content"></div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" id="prev-btn" onclick="prevCard()">Previous</button>
        <span class="progress" id="progress-display">0 / 0</span>
        <button class="nav-btn" id="next-btn" onclick="nextCard()">Next</button>
    </div>
    
    <div class="flip-hint">💡 點擊卡片翻面查看答案</div>

    <script>
        // 預設的單字資料（若不匯入就用這份）
        let vocabData = [
            {week: "1", word: "conjecture", pos: "noun/verb", def: "an opinion or conclusion based on incomplete evidence", zh: "推測；臆測"},
            {week: "1", word: "impartial", pos: "adjective", def: "not favoring any side; fair and unbiased", zh: "公正的；不偏不倚的"}
            // (為了程式碼簡潔，這裡省略了原本內建的完整預設單字，你可以視情況決定是否要保留預設值)
        ];

        let currentData = [...vocabData];
        let currentIndex = 0;
        let isReverseMode = false; 

        const cardFront = document.getElementById('card-front-content');
        const cardBack = document.getElementById('card-back-content');
        const progressDisplay = document.getElementById('progress-display');
        const flashcard = document.getElementById('flashcard');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const filterContainer = document.getElementById('week-filters');
        const reverseBtn = document.getElementById('reverse-btn');

        // 初始化
        function init() {
            renderWeekFilters();
            updateCard();
        }

        // 動態生成週數過濾器
        function renderWeekFilters() {
            // 找出所有的 week (去除重複並排序)
            const weeks = [...new Set(vocabData.map(item => item.week))].filter(w => w).sort((a, b) => {
                const numA = parseInt(String(a).replace(/[^0-9]/g, '')) || 0;
                const numB = parseInt(String(b).replace(/[^0-9]/g, '')) || 0;
                return numA - numB;
            });

            filterContainer.innerHTML = '<button class="filter-btn active" data-week="All">All Weeks</button>';
            
            weeks.forEach(week => {
                filterContainer.innerHTML += `<button class="filter-btn" data-week="${week}">Week ${week}</button>`;
            });

            // 重新綁定事件
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    const selectedWeek = e.target.getAttribute('data-week');
                    if (selectedWeek === 'All') {
                        currentData = [...vocabData];
                    } else {
                        currentData = vocabData.filter(item => item.week == selectedWeek);
                    }
                    
                    currentIndex = 0;
                    resetFlipAndUpdate();
                });
            });
        }

        // 處理 Excel 檔案上傳
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // 讀取第一個工作表
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // 將 Excel 資料轉為 JSON 陣列
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                const newVocabData = [];

                jsonData.forEach(row => {
                    // 自動匹配你提供的欄位名稱
                    const weekRaw = row['Week #'] || row['Week'] || '1';
                    const weekNum = String(weekRaw).replace(/Week\s*/gi, '').trim(); 
                    const word = row['Word'] || row['單字'] || '';
                    const pos = row['Part of Speech'] || row['詞性'] || '';
                    const defEn = row['Definition (EN)'] || row['英文定義'] || '';
                    const defZh = row['Chinese Meaning'] || row['中文意思'] || '';

                    if (word && defEn) {
                        newVocabData.push({
                            week: weekNum,
                            word: word,
                            pos: pos,
                            def: defEn,
                            zh: defZh
                        });
                    }
                });

                if (newVocabData.length > 0) {
                    vocabData = newVocabData; // 替換掉舊資料
                    currentData = [...vocabData];
                    currentIndex = 0;
                    init(); // 重新渲染畫面
                    alert(`✅ 成功匯入 ${newVocabData.length} 個單字！`);
                } else {
                    alert('❌ 找不到單字資料，請確定 Excel 標題包含：\n"Week #", "Word", "Part of Speech", "Definition (EN)"');
                }
                
                // 清空 input 讓下次可以重新上傳同一個檔案
                event.target.value = ''; 
            };
            reader.readAsArrayBuffer(file);
        }

        function getWordHtml(word) {
            return `<p class="word-title">${word.word}</p>`;
        }

        function getDefHtml(word) {
            let html = `<span class="pos-badge">${word.pos}</span>
                        <p class="definition-text">${word.def}</p>`;
            // 若 Excel 裡有中文翻譯，也顯示在下方（配合你上傳的資料）
            if (word.zh) {
                html += `<p class="definition-zh">${word.zh}</p>`;
            }
            return html;
        }

        function updateCard() {
            if (currentData.length === 0) {
                cardFront.innerHTML = `<p class="word-title">沒有找到單字</p>`;
                cardBack.innerHTML = `<p class="definition-text">請匯入 Excel 或選擇其他週數</p>`;
                progressDisplay.textContent = "0 / 0";
                return;
            }

            const currentWord = currentData[currentIndex];
            
            if (isReverseMode) {
                cardFront.innerHTML = getDefHtml(currentWord);
                cardBack.innerHTML = getWordHtml(currentWord);
            } else {
                cardFront.innerHTML = getWordHtml(currentWord);
                cardBack.innerHTML = getDefHtml(currentWord);
            }
            
            progressDisplay.textContent = `${currentIndex + 1} / ${currentData.length}`;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === currentData.length - 1;
        }

        function toggleFlip() {
            if (currentData.length > 0) flashcard.classList.toggle('flipped');
        }

        function shuffleCards() {
            for (let i = currentData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentData[i], currentData[j]] = [currentData[j], currentData[i]];
            }
            currentIndex = 0;
            resetFlipAndUpdate();
        }

        function toggleReverseMode() {
            isReverseMode = !isReverseMode;
            if (isReverseMode) {
                reverseBtn.textContent = "🔄 看單字猜定義 (Word First)";
                reverseBtn.style.backgroundColor = "var(--accent-color)";
                reverseBtn.style.color = "white";
            } else {
                reverseBtn.textContent = "🔄 看定義猜單字 (Definition First)";
                reverseBtn.style.backgroundColor = "transparent";
                reverseBtn.style.color = "var(--accent-color)";
            }
            resetFlipAndUpdate();
        }

        function prevCard() {
            if (currentIndex > 0) { currentIndex--; resetFlipAndUpdate(); }
        }

        function nextCard() {
            if (currentIndex < currentData.length - 1) { currentIndex++; resetFlipAndUpdate(); }
        }

        function resetFlipAndUpdate() {
            if (flashcard.classList.contains('flipped')) {
                flashcard.classList.remove('flipped');
                setTimeout(updateCard, 300); 
            } else {
                updateCard();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
