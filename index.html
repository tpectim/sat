    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background-color: transparent;
            border: 2px solid var(--secondary-color);
            color: var(--secondary-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--secondary-color);
            color: white;
        }

        .flashcard-container {
            width: 100%;
            max-width: 500px;
            height: 300px;
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            background-color: var(--card-bg);
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-front {
            color: var(--primary-color);
        }

        .card-front h2 {
            font-size: 2.5rem;
            margin: 0;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--primary-color);
            color: white;
        }

        .pos-badge {
            background-color: var(--secondary-color);
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .definition {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .nav-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .nav-btn:hover {
            background-color: #1a252f;
        }

        .nav-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .progress {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .flip-hint {
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>

            updateCard();

            filterBtns.forEach(btn => {

                    // 更新按鈕樣式
                    filterBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    // 篩選資料
                    const selectedWeek = e.target.getAttribute('data-week');
                    if (selectedWeek === 'All') {
                        currentData = [...vocabData];
                    } else {
                        currentData = vocabData.filter(item => item.week === selectedWeek);
                    }
                    
                    currentIndex = 0;
                    if(flashcard.classList.contains('flipped')) {
                        flashcard.classList.remove('flipped');
                        setTimeout(updateCard, 300); // 等待翻轉動畫結束再更新文字
                    } else {
                        updateCard();
                    }
                });
            });
        }

                return;
            }

            const currentWord = currentData[currentIndex];
            wordDisplay.textContent = currentWord.word;
            posDisplay.textContent = currentWord.pos;
            defDisplay.textContent = currentWord.def;
            
            progressDisplay.textContent = `${currentIndex + 1} / ${currentData.length}`;
            
            // 更新按鈕狀態
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === currentData.length - 1;
        }

        // 翻轉卡片
        function toggleFlip() {
            if (currentData.length > 0) {
                flashcard.classList.toggle('flipped');
            }
        }

        // 上一張
        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                resetFlipAndUpdate();
            }
        }

        // 下一張
        function nextCard() {
            if (currentIndex < currentData.length - 1) {
                currentIndex++;
                resetFlipAndUpdate();
            }
        }

        // 確保切換單字時卡片回到正面
        function resetFlipAndUpdate() {
            if (flashcard.classList.contains('flipped')) {
                flashcard.classList.remove('flipped');
                setTimeout(updateCard, 300); // 等待動畫完成再換字
            } else {
                updateCard();
            }
        }

        // 執行初始化
        window.onload = init;
    </script>
</body>
</html>
