<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT 核心單字互動字卡</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e67e22;
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .controls, .settings-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        select {
            padding: 8px 12px;
            font-size: 1em;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: 2px solid var(--secondary-color);
            border-radius: 8px;
            background-color: var(--secondary-color);
            color: white;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            background-color: #2980b9;
            border-color: #2980b9;
        }

        button:active:not(:disabled) {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #cccccc;
            border-color: #cccccc;
            cursor: not-allowed;
        }

        #reverse-btn {
            background-color: transparent;
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .flashcard-container {
            perspective: 1000px;
            width: 380px;
            height: 280px;
            margin-bottom: 20px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-sizing: border-box;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            background-color: var(--card-bg);
            border: 2px solid #e0e0e0;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fdfbf7; 
            border: 2px solid var(--secondary-color);
        }

        .word {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .pos {
            font-size: 1.1em;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 15px;
        }

        .definition {
            font-size: 1.25em;
            margin-bottom: 15px;
            line-height: 1.5;
            color: #444;
        }

        .chinese {
            font-size: 1.6em;
            font-weight: bold;
            color: var(--accent-color);
        }

        .week-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--primary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .hint {
            position: absolute;
            bottom: 15px;
            font-size: 0.85em;
            color: #95a5a6;
        }

        .progress {
            margin-top: 10px;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1em;
        }

        .empty-state {
            font-size: 1.2em;
            color: #888;
            display: none;
        }
    </style>
</head>
<body>

    <h1>SAT 核心單字互動字卡</h1>

    <div class="settings-controls">
        <label for="week-filter"><strong>選擇範圍：</strong></label>
        <select id="week-filter" onchange="filterCards()">
            <option value="all" selected>全部單字 (Weeks 1-5)</option>
            <option value="1">Week 1</option>
            <option value="2">Week 2</option>
            <option value="3">Week 3</option>
            <option value="4">Week 4</option>
            <option value="5">Week 5</option>
        </select>
        <button onclick="shuffleCards()" style="background-color: #27ae60; border-color: #27ae60;">🔀 隨機打亂</button>
        <button id="reverse-btn" onclick="toggleReverseMode()">🔄 看定義猜單字</button>
    </div>

    <div class="flashcard-container" id="card-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="card-face card-front" id="card-front"></div>
            <div class="card-face card-back" id="card-back"></div>
        </div>
    </div>
    
    <div class="empty-state" id="empty-state">此週次目前沒有單字。</div>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard()">⬅️ 上一個</button>
        <button onclick="flipCard()">🔄 翻面</button>
        <button id="next-btn" onclick="nextCard()">下一個 ➡️</button>
    </div>
    
    <div class="progress" id="progress-text"></div>

        let currentData = [];
        let currentIndex = 0;
        let isReverseMode = false;
        
        const flashcard = document.getElementById('flashcard');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const reverseBtn = document.getElementById('reverse-btn');

        // 初始化
        function init() {
            filterCards(); // 套用預設的「全部單字」篩選
        }

        // 篩選週次
        function filterCards() {
            const selectedWeek = document.getElementById('week-filter').value;
            if (selectedWeek === 'all') {
                currentData = [...vocabularyData];
            } else {
                currentData = vocabularyData.filter(item => item.week === selectedWeek);
            }
            currentIndex = 0;
            resetFlipAndUpdate();
        }

        // 隨機打亂
        function shuffleCards() {
            for (let i = currentData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentData[i], currentData[j]] = [currentData[j], currentData[i]];
            }
            currentIndex = 0;
            resetFlipAndUpdate();
        }

        // 渲染卡片內容 (支援 Reverse Mode)
        function updateCard() {
            if (currentData.length === 0) {
                document.getElementById('card-container').style.display = 'none';
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('progress-text').textContent = '';
                document.getElementById('prev-btn').disabled = true;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            document.getElementById('card-container').style.display = 'block';
            document.getElementById('empty-state').style.display = 'none';

            const wordObj = currentData[currentIndex];

            // 準備內容 HTML
            const wordContent = `
                <div class="week-badge">Week ${wordObj.week}</div>
                <div class="word">${wordObj.word}</div>
                <div class="pos">(${wordObj.pos})</div>
                <div class="hint">點擊卡片翻面看定義</div>
            `;

            const defContent = `
                <div class="week-badge">Week ${wordObj.week}</div>
                <div class="definition">${wordObj.def}</div>
                <div class="chinese">${wordObj.zh}</div>
                <div class="hint">點擊卡片翻面看單字</div>
            `;

            // 根據是否為 Reverse Mode 決定正反面放什麼
            if (isReverseMode) {
                cardFront.innerHTML = defContent;
                cardBack.innerHTML = wordContent;
            } else {
                cardFront.innerHTML = wordContent;
                cardBack.innerHTML = defContent;
            }

            document.getElementById('progress-text').textContent = `Card ${currentIndex + 1} / ${currentData.length}`;
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === currentData.length - 1;
        }

        // 切換正反面模式 (Reverse Mode)
        function toggleReverseMode() {
            isReverseMode = !isReverseMode;
            
            // 更新按鈕文字與樣式
            if (isReverseMode) {
                reverseBtn.textContent = "🔄 看單字猜定義 (Word First)";
                reverseBtn.style.backgroundColor = "var(--accent-color)";
                reverseBtn.style.color = "white";
            } else {
                reverseBtn.textContent = "🔄 看定義猜單字 (Definition First)";
                reverseBtn.style.backgroundColor = "transparent";
                reverseBtn.style.color = "var(--accent-color)";
            }
            
            resetFlipAndUpdate();
        }

        function flipCard() {
            if (currentData.length > 0) {
                flashcard.classList.toggle('flipped');
            }
        }

        // 確保切換單字時卡片回到初始面
        function resetFlipAndUpdate() {
            if (flashcard.classList.contains('flipped')) {
                flashcard.classList.remove('flipped');
                setTimeout(updateCard, 300); // 等待翻轉動畫完成再換字
            } else {
                updateCard();
            }
        }

        // 上一張
        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                resetFlipAndUpdate();
            }
        }

        // 下一張
        function nextCard() {
            if (currentIndex < currentData.length - 1) {
                currentIndex++;
                resetFlipAndUpdate();
            }
        }

        // 鍵盤控制
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') nextCard();
            else if (event.key === 'ArrowLeft') prevCard();
            else if (event.key === ' ' || event.key === 'ArrowUp' || event.key === 'ArrowDown') {
                event.preventDefault(); 
                flipCard();
            }
        });

        // 執行初始化
        window.onload = init;
    </script>
