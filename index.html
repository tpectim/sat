<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT 單字字卡 (Weeks 1-5)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .header-controls {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        select {
            padding: 8px 12px;
            font-size: 1em;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            cursor: pointer;
        }
        .flashcard-container {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            margin-bottom: 20px;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card-front {
            background-color: #ffffff;
            color: #333;
        }
        .card-back {
            background-color: #4CAF50;
            color: white;
            transform: rotateY(180deg);
        }
        .word {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .pos {
            font-size: 1em;
            color: #7f8c8d;
            font-style: italic;
        }
        .definition {
            font-size: 1.2em;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .chinese {
            font-size: 1.5em;
            font-weight: bold;
            color: #e8f5e9;
        }
        .week-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #e0e0e0;
            color: #555;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .card-back .week-badge {
            background-color: rgba(255,255,255,0.2);
            color: white;
        }
        .hint {
            position: absolute;
            bottom: 15px;
            font-size: 0.8em;
            color: #aaa;
        }
        .card-back .hint {
            color: rgba(255,255,255,0.7);
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #008CBA;
            color: white;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover:not(:disabled) {
            background-color: #007B9E;
        }
        button:active:not(:disabled) {
            transform: scale(0.95);
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .progress {
            margin-top: 15px;
            color: #666;
            font-weight: bold;
        }
        .empty-state {
            font-size: 1.2em;
            color: #888;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header-controls">
        <label for="week-filter"><strong>選擇範圍：</strong></label>
        <select id="week-filter" onchange="filterCards()">
            <option value="all">全部單字 (Weeks 1-5)</option>
            <option value="1">Week 1</option>
            <option value="2">Week 2</option>
            <option value="3">Week 3</option>
            <option value="4">Week 4</option>
            <option value="5">Week 5</option>
        </select>
        <button onclick="shuffleCards()" style="background-color: #f39c12;">🔀 隨機打亂</button>
    </div>

    <div class="flashcard-container" id="card-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="week-badge" id="front-week"></div>
                <div class="word" id="front-word"></div>
                <div class="pos" id="front-pos"></div>
                <div class="hint">點擊卡片翻面</div>
            </div>
            <div class="card-face card-back">
                <div class="week-badge" id="back-week"></div>
                <div class="definition" id="back-def"></div>
                <div class="chinese" id="back-zh"></div>
                <div class="hint">點擊卡片翻回正面</div>
            </div>
        </div>
    </div>
    
    <div class="empty-state" id="empty-state">此週次目前沒有單字。</div>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard()">上一個</button>
        <button onclick="flipCard()">翻面</button>
        <button id="next-btn" onclick="nextCard()">下一個</button>
    </div>
    
    <div class="progress" id="progress-text"></div>

            {week: "5", word: "luminescence", pos: "noun", def: "the emission of light without heat", zh: "發光現象"},
            {week: "5", word: "curtail", pos: "verb", def: "to reduce or limit something", zh: "縮減；限制"},
            {week: "5", word: "opulence", pos: "noun", def: "great wealth or luxury", zh: "富裕；奢華"},
            {week: "5", word: "demise", pos: "noun", def: "the end or death of something", zh: "終結；死亡"},
            {week: "5", word: "sensuous", pos: "adjective", def: "relating to physical pleasure or the senses", zh: "感官的；感性的"},
            {week: "5", word: "chide", pos: "verb", def: "to scold or criticize mildly", zh: "責備；斥責"},
            {week: "5", word: "meticulous", pos: "adjective", def: "showing great attention to detail", zh: "一絲不苟的；細心的"},
            {week: "5", word: "trivial", pos: "adjective", def: "of little importance", zh: "瑣碎的；不重要的"},
            {week: "5", word: "hamper", pos: "verb", def: "to hinder or obstruct progress", zh: "阻礙；妨礙"},
            {week: "5", word: "depose", pos: "verb", def: "to remove from power", zh: "罷免；廢黜"},
            {week: "5", word: "grandeur", pos: "noun", def: "magnificence or greatness", zh: "宏偉；壯麗"},
            {week: "5", word: "placid", pos: "adjective", def: "calm and peaceful", zh: "平靜的；溫和的"},
            {week: "5", word: "sluggish", pos: "adjective", def: "slow-moving or lacking energy", zh: "遲緩的；無精打采的"},
            {week: "5", word: "engender", pos: "verb", def: "to cause or bring about", zh: "產生；引起"},
            {week: "5", word: "rescind", pos: "verb", def: "to officially cancel or revoke", zh: "撤銷；廢除"}
        ];

        let currentList = [...masterVocabularyList];
        let currentIndex = 0;
        
        const flashcard = document.getElementById('flashcard');
        const cardContainer = document.getElementById('card-container');
        const emptyState = document.getElementById('empty-state');

        function filterCards() {
            const selectedWeek = document.getElementById('week-filter').value;
            
            if (selectedWeek === 'all') {
                currentList = [...masterVocabularyList];
            } else {
                currentList = masterVocabularyList.filter(word => word.week === selectedWeek);
            }
            
            currentIndex = 0;
            updateCard();
        }

        function shuffleCards() {
            // Fisher-Yates 洗牌演算法
            for (let i = currentList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentList[i], currentList[j]] = [currentList[j], currentList[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        function updateCard() {
            if (currentList.length === 0) {
                cardContainer.style.display = 'none';
                emptyState.style.display = 'block';
                document.getElementById('progress-text').textContent = '';
                document.getElementById('prev-btn').disabled = true;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            cardContainer.style.display = 'block';
            emptyState.style.display = 'none';

            const currentWord = currentList[currentIndex];
            flashcard.classList.remove('is-flipped');

            setTimeout(() => {
                document.getElementById('front-week').textContent = `Week ${currentWord.week}`;
                document.getElementById('front-word').textContent = currentWord.word;
                document.getElementById('front-pos').textContent = `(${currentWord.pos})`;
                
                document.getElementById('back-week').textContent = `Week ${currentWord.week}`;
                document.getElementById('back-def').textContent = currentWord.def;
                document.getElementById('back-zh').textContent = currentWord.zh;
                
                document.getElementById('progress-text').textContent = `Card ${currentIndex + 1} / ${currentList.length}`;
                
                document.getElementById('prev-btn').disabled = currentIndex === 0;
                document.getElementById('next-btn').disabled = currentIndex === currentList.length - 1;
            }, 150); 
        }

        function flipCard() {
            if (currentList.length > 0) {
                flashcard.classList.toggle('is-flipped');
            }
        }

        function nextCard() {
            if (currentIndex < currentList.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // 初始化
        updateCard();
        
        // 鍵盤控制
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') {
                nextCard();
            } else if (event.key === 'ArrowLeft') {
                prevCard();
            } else if (event.key === ' ' || event.key === 'ArrowUp' || event.key === 'ArrowDown') {
                event.preventDefault(); 
                flipCard();
            }
        });
    </script>
</body>
