<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT 核心單字互動字卡</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e67e22;
            --background-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { color: var(--primary-color); margin-bottom: 20px; text-align: center; }
        
        .settings-controls, .controls {
            display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; 
            justify-content: center; align-items: center;
        }

        select { padding: 8px 12px; font-size: 1em; border-radius: 8px; border: 1px solid #ccc; outline: none; cursor: pointer; }
        
        button {
            padding: 10px 20px; font-size: 1em; cursor: pointer; border: 2px solid var(--secondary-color);
            border-radius: 8px; background-color: var(--secondary-color); color: white;
            transition: all 0.3s ease; font-weight: bold;
        }
        button:hover:not(:disabled) { background-color: #2980b9; border-color: #2980b9; }
        button:active:not(:disabled) { transform: scale(0.95); }
        button:disabled { background-color: #cccccc; border-color: #cccccc; cursor: not-allowed; }

        #reverse-btn { background-color: transparent; color: var(--accent-color); border-color: var(--accent-color); }

        .flashcard-container { perspective: 1000px; width: 380px; height: 280px; margin-bottom: 20px; display: none; }
        
        .flashcard {
            width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer; position: relative;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        
        .card-face {
            width: 100%; height: 100%; position: absolute; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 25px; box-sizing: border-box; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center; background-color: var(--card-bg); border: 2px solid #e0e0e0;
        }
        .card-back { transform: rotateY(180deg); background-color: #fdfbf7; border: 2px solid var(--secondary-color); }
        
        .word { font-size: 2.2em; font-weight: bold; margin-bottom: 5px; color: var(--primary-color); }
        .pos { font-size: 1.1em; color: #7f8c8d; font-style: italic; margin-bottom: 15px; }
        .chinese { font-size: 1.8em; font-weight: bold; color: var(--accent-color); margin-bottom: 15px; }
        .example { font-size: 1.1em; color: #555; font-style: italic; line-height: 1.4; margin-bottom: 15px; padding: 0 10px; white-space: pre-wrap; }
        
        .week-badge {
            position: absolute; top: 15px; left: 15px; background-color: var(--primary-color);
            color: white; padding: 5px 12px; border-radius: 12px; font-size: 0.85em; font-weight: bold;
        }
        .hint { position: absolute; bottom: 15px; font-size: 0.85em; color: #95a5a6; }
        .progress { margin-top: 10px; color: var(--primary-color); font-weight: bold; font-size: 1.1em; }
        
        .empty-state { font-size: 1.2em; color: #e67e22; font-weight: bold; text-align: center; padding: 20px; }
        .loading-spinner { font-size: 2em; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>SAT 核心單字互動字卡</h1>

    <div class="settings-controls">
        <label for="week-filter"><strong>選擇範圍：</strong></label>
        <select id="week-filter" onchange="filterCards()">
            <option value="all" selected>全部單字 (Weeks 1-6)</option>
            <option value="1">Week 1</option>
            <option value="2">Week 2</option>
            <option value="3">Week 3</option>
            <option value="4">Week 4</option>
            <option value="5">Week 5</option>
             <option value="6">Week 6</option>

        </select>
        <button onclick="shuffleCards()" style="background-color: #27ae60; border-color: #27ae60;">🔀 隨機打亂</button>
        <button id="reverse-btn" onclick="toggleReverseMode()">🔄 看中文猜單字</button>
    </div>

    <div class="empty-state" id="empty-state">
        <div class="loading-spinner">⏳</div><br>
        正在從 GitHub 載入單字資料，請稍候...
    </div>

    <div class="flashcard-container" id="card-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="card-face card-front" id="card-front"></div>
            <div class="card-face card-back" id="card-back"></div>
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard()" disabled>⬅️ 上一個</button>
        <button onclick="flipCard()">🔄 翻面</button>
        <button id="next-btn" onclick="nextCard()" disabled>下一個 ➡️</button>
    </div>
    
    <div class="progress" id="progress-text"></div>

    <script>
        const dataUrl = "https://raw.githubusercontent.com/tpectim/sat/refs/heads/main/word.csv";
        
        let vocabularyData = []; 
        let currentData = [];
        let currentIndex = 0;
        let isReverseMode = false;
        
        const flashcard = document.getElementById('flashcard');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const reverseBtn = document.getElementById('reverse-btn');

        async function loadDataFromGitHub() {
            try {
                const response = await fetch(dataUrl + "?t=" + new Date().getTime());
                if (!response.ok) throw new Error("網路請求失敗，找不到檔案");
                const text = await response.text();
                parseCSV(text);
                filterCards();
            } catch (error) {
                console.error("載入失敗:", error);
                document.getElementById('empty-state').innerHTML = "❌ 載入單字失敗，請檢查網路連線或 GitHub 網址是否正確。";
            }
        }

        // 解析器：加入分隔符號偵測，可同時處理逗號(CSV)或Tab(TSV)分隔
        function parseCSVData(text, delimiter) {
            let result = [];
            let curRow = [];
            let curVal = '';
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (inQuotes) {
                    if (char === '"') {
                        if (i < text.length - 1 && text[i + 1] === '"') {
                            curVal += '"'; i++; 
                        } else { 
                            inQuotes = false; 
                        }
                    } else { 
                        curVal += char; 
                    }
                } else {
                    if (char === '"') { 
                        inQuotes = true; 
                    } else if (char === delimiter) { 
                        curRow.push(curVal); curVal = ''; 
                    } else if (char === '\n' || char === '\r') {
                        curRow.push(curVal);
                        if (curRow.some(v => v.trim() !== '')) result.push(curRow);
                        curRow = [];
                        curVal = '';
                        if (char === '\r' && i < text.length - 1 && text[i + 1] === '\n') i++; 
                    } else { 
                        curVal += char; 
                    }
                }
            }
            if (curVal !== '' || curRow.length > 0) {
                curRow.push(curVal);
                if (curRow.some(v => v.trim() !== '')) result.push(curRow);
            }
            return result;
        }

        function parseCSV(text) {
            // 自動判斷分隔符號：如果檔案包含 Tab，就用 Tab 解析，否則用逗號
            const delimiter = text.indexOf('\t') !== -1 ? '\t' : ',';
            const rows = parseCSVData(text, delimiter);
            
            vocabularyData = []; 
            if (rows.length < 2) return;

            // 絕對索引對應 (根據您提供的格式)
            // [0]Week, [1]Word, [2]Importance, [3]Pos, [4]Def, [5]Chinese, [6]Example
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                
                // 防呆：確保該列有單字資料才寫入
                if (row.length <= 1 || !row[1] || !row[1].trim()) continue;
                
                let weekStr = row[0] || "";
                let weekNum = weekStr.replace(/[^0-9]/g, ''); 
                if(!weekNum) weekNum = "0"; 

                vocabularyData.push({
                    week: weekNum,
                    word: row[1].trim(),
                    pos: row[3] ? row[3].trim() : "",
                    zh: row[5] ? row[5].trim() : "",
                    example: row[6] ? row[6].trim() : ""
                });
            }
        }

        function filterCards() {
            if (vocabularyData.length === 0) return; 
            const selectedWeek = document.getElementById('week-filter').value;
            if (selectedWeek === 'all') {
                currentData = [...vocabularyData];
            } else {
                currentData = vocabularyData.filter(item => item.week === selectedWeek);
            }
            currentIndex = 0;
            resetFlipAndUpdate();
        }

        function shuffleCards() {
            if (currentData.length === 0) return;
            for (let i = currentData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentData[i], currentData[j]] = [currentData[j], currentData[i]];
            }
            currentIndex = 0;
            resetFlipAndUpdate();
        }

        function updateCard() {
            if (currentData.length === 0) {
                document.getElementById('card-container').style.display = 'none';
                document.getElementById('empty-state').innerHTML = "此週次目前沒有單字。";
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('progress-text').textContent = '';
                document.getElementById('prev-btn').disabled = true;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('card-container').style.display = 'block';

            const wordObj = currentData[currentIndex];

            // 正面：單字 + 詞性
            const frontContent = `
                <div class="week-badge">Week ${wordObj.week}</div>
                <div class="word">${wordObj.word}</div>
                <div class="pos">(${wordObj.pos})</div>
                <div class="hint">點擊卡片翻面看中文與例句</div>
            `;

            // 背面：中文 + 例句
            const exampleHtml = wordObj.example ? `<div class="example">"${wordObj.example}"</div>` : '';
            const backContent = `
                <div class="week-badge">Week ${wordObj.week}</div>
                <div class="chinese">${wordObj.zh}</div>
                ${exampleHtml}
                <div class="hint">點擊卡片翻面看單字</div>
            `;

            if (isReverseMode) {
                cardFront.innerHTML = backContent;
                cardBack.innerHTML = frontContent;
            } else {
                cardFront.innerHTML = frontContent;
                cardBack.innerHTML = backContent;
            }

            document.getElementById('progress-text').textContent = `Card ${currentIndex + 1} / ${currentData.length}`;
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === currentData.length - 1;
        }

        function toggleReverseMode() {
            isReverseMode = !isReverseMode;
            if (isReverseMode) {
                reverseBtn.textContent = "🔄 看單字猜中文 (Word First)";
                reverseBtn.style.backgroundColor = "var(--accent-color)";
                reverseBtn.style.color = "white";
            } else {
                reverseBtn.textContent = "🔄 看中文猜單字 (Chinese First)";
                reverseBtn.style.backgroundColor = "transparent";
                reverseBtn.style.color = "var(--accent-color)";
            }
            resetFlipAndUpdate();
        }

        function flipCard() {
            if (currentData.length > 0) flashcard.classList.toggle('flipped');
        }

        function resetFlipAndUpdate() {
            if (flashcard.classList.contains('flipped')) {
                flashcard.classList.remove('flipped');
                setTimeout(updateCard, 300);
            } else {
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) { currentIndex--; resetFlipAndUpdate(); }
        }

        function nextCard() {
            if (currentIndex < currentData.length - 1) { currentIndex++; resetFlipAndUpdate(); }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') nextCard();
            else if (event.key === 'ArrowLeft') prevCard();
            else if (event.key === ' ' || event.key === 'ArrowUp' || event.key === 'ArrowDown') {
                event.preventDefault(); 
                flipCard();
            }
        });

        window.onload = loadDataFromGitHub;
    </script>
</body>
</html>
